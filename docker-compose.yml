services:
  postgres:
    image: postgres:16
    container_name: banking_postgres
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: banking_adminer
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - postgres

  api:
    build: .
    container_name: banking_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres_data: