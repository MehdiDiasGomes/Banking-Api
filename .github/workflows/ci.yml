name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check for debug logs
        run: |
          if grep -rn "System\.out\.print" src/main/java; then
            echo "❌ System.out.print found in production code"
            exit 1
          fi

      - name: Run tests
        run: ./mvnw test -q
